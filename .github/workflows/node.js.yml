name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
       
      - name: Check code duplication
        run: npx jscpd controllers routes models middleware utils observers --threshold 3
      - name: Install frontend dependencies
        working-directory: client
        run: npm install

      - name: Run ESLint (complexity check)
        working-directory: client
        run: npm run lint
